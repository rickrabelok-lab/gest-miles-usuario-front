<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Gest Miles</title>
    <meta
      name="description"
      content="Gest Miles — gestão de milhas e pontos de fidelidade."
    />
    <meta name="author" content="Gest Miles" />
    <meta name="theme-color" content="#0d9488" />

    <script>
      // Esqueleto de boot: só nas rotas com shell autenticado. Nas públicas
      // (/auth*, /me) o próprio React renderiza a tela inteira — esqueleto some.
      // PATHS em sincronia com as rotas públicas de src/App.tsx.
      (function () {
        var p = window.location.pathname;
        var publico = p === "/auth" || p.indexOf("/auth/") === 0 || p === "/me";
        if (publico) document.documentElement.classList.add("gm-no-skeleton");
      })();
    </script>
    <style>
      /* Esqueleto de boot (1º frame, pré-JS) — substitui o antigo splash "VOA".
         React o remove no primeiro commit do render (markup vive dentro de #root).
         Cores hardcoded: o CSS do app ainda não carregou neste momento. */
      .gm-skel {
        position: fixed;
        inset: 0;
        z-index: 40;
        background: #f7f7f8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html.gm-no-skeleton .gm-skel {
        display: none;
      }
      .gm-skel-page {
        max-width: 28rem;
        margin: 0 auto;
        padding: 22px 20px 0;
      }
      .gm-skel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .gm-skel-brand {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.4px;
        color: #1f1f1f;
      }
      .gm-skel-brand span {
        color: #8a05be;
      }
      .gm-skel-circles {
        display: flex;
        gap: 8px;
      }
      .gm-skel-circle {
        width: 44px;
        height: 44px;
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid #ececec;
      }
      .gm-skel-row {
        height: 48px;
        border-radius: 16px;
        background: #f1f1f3;
        margin-bottom: 18px;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      .gm-skel-card {
        height: 128px;
        border-radius: 20px;
        background: #ffffff;
        border: 1px solid #ececec;
        margin-bottom: 18px;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      .gm-skel-actions {
        display: flex;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      .gm-skel-action {
        width: 72px;
        height: 72px;
        border-radius: 24px;
        background: #ffffff;
        border: 1px solid #ececec;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      .gm-skel-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .gm-skel-tile {
        height: 150px;
        border-radius: 20px;
        background: #ffffff;
        border: 1px solid #ececec;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      .gm-skel-nav {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: #ffffff;
        border-top: 1px solid #ececec;
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 0 12px;
      }
      .gm-skel-nav-item {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: #f1f1f3;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      @keyframes gm-skel-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
    </style>

    <!-- Abertura animada "B · Constelação" (identidade GestMiles) — SÓ no app nativo
         (Capacitor). Portada do projeto Claude Design "GestMiles · Identidade Visual"
         pra CSS/SVG puro (sem React/CDN): estrelas → traçado → asa sólida → pin ciano
         → alça → bob + barra shimmer. One-shot ~4.9s + fade. Web: removida no boot. -->
    <style>
      #gm-abertura {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 60;
        background: #050008;
        opacity: 1;
        transition: opacity 0.45s ease-out;
      }
      #gm-abertura.gm-ab-on { display: block; }
      #gm-abertura.gm-ab-out { opacity: 0; }
      #gm-abertura svg { width: 100%; height: 100%; display: block; }

      .gm-ab-stars {
        animation: gmAbSpread 0.8s cubic-bezier(0.45, 0, 0.55, 1) 2.9s forwards;
        transform-origin: 195px 371px;
      }
      .gm-ab-star { opacity: 0; animation: gmAbStarIn 0.45s ease-out var(--d) forwards, gmAbTwinkle 3.2s ease-in-out calc(var(--d) + 0.45s) infinite; }
      .gm-ab-glow { animation: gmAbGlowPulse 1.3s ease-in-out infinite alternate; }

      .gm-ab-anc { opacity: 0; animation: gmAbAncIn 0.35s ease-out var(--d) forwards; }
      .gm-ab-anc circle { animation: gmAbAncPulse 1.05s ease-in-out var(--d) infinite alternate; }
      .gm-ab-ancoras { animation: gmAbDim 0.45s cubic-bezier(0.45, 0, 0.55, 1) 2.1s forwards; }

      .gm-ab-linha { opacity: 0; animation: gmAbTraco 0.55s cubic-bezier(0.45, 0, 0.55, 1) var(--d) forwards; }
      .gm-ab-linhas { animation: gmAbSome 0.45s cubic-bezier(0.45, 0, 0.55, 1) 2.1s forwards; }

      .gm-ab-asa { opacity: 0; animation: gmAbAparece 0.45s cubic-bezier(0.45, 0, 0.55, 1) 2.1s forwards; }
      .gm-ab-asa-scale { transform: scale(1.04); transform-origin: 0 0; animation: gmAbAssenta 0.45s cubic-bezier(0.45, 0, 0.55, 1) 2.1s forwards; }

      .gm-ab-pin { opacity: 0; animation: gmAbPinPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) 2.6s forwards, gmAbPinOp 0.12s linear 2.6s forwards; transform: scale(0.3); }
      .gm-ab-ripple { opacity: 0; animation: gmAbRipple 0.6s cubic-bezier(0.33, 1, 0.68, 1) 2.9s forwards; transform: scale(0.2); }

      .gm-ab-alca { opacity: 0; animation: gmAbAlca 0.42s cubic-bezier(0.45, 0, 0.55, 1) 3.15s forwards; }

      .gm-ab-idle { animation: gmAbBob 2.6s ease-in-out 3.9s infinite; }

      .gm-ab-barra { opacity: 0; animation: gmAbAparece 0.3s linear 4.05s forwards; }
      .gm-ab-shim { animation: gmAbShim 1.4s linear 4.05s infinite; transform: translateX(-90px); }

      @keyframes gmAbStarIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes gmAbTwinkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
      @keyframes gmAbSpread { to { transform: scale(1.05); } }
      @keyframes gmAbGlowPulse { from { opacity: 0.5; } to { opacity: 0.9; } }
      @keyframes gmAbAncIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes gmAbAncPulse { from { opacity: 1; } to { opacity: 0.45; } }
      @keyframes gmAbDim { to { opacity: 0.15; } }
      @keyframes gmAbTraco { from { opacity: 0.85; stroke-dashoffset: var(--len); } to { opacity: 0.85; stroke-dashoffset: 0; } }
      @keyframes gmAbSome { from { opacity: 1; } to { opacity: 0; } }
      @keyframes gmAbAparece { from { opacity: 0; } to { opacity: 1; } }
      @keyframes gmAbAssenta { to { transform: scale(1); } }
      @keyframes gmAbPinPop { from { transform: scale(0.3); } to { transform: scale(1); } }
      @keyframes gmAbPinOp { from { opacity: 0; } to { opacity: 1; } }
      @keyframes gmAbRipple { from { opacity: 0.6; transform: scale(0.2); } to { opacity: 0; transform: scale(1); } }
      @keyframes gmAbAlca { from { opacity: 0.95; stroke-dashoffset: 72; } to { opacity: 0.95; stroke-dashoffset: 0; } }
      @keyframes gmAbBob { 0%, 100% { transform: translateY(0); } 25% { transform: translateY(-3px); } 75% { transform: translateY(3px); } }
      @keyframes gmAbShim { from { transform: translateX(-90px); } to { transform: translateX(120px); } }

    <script>
      // Gate da abertura: só no app nativo (Capacitor injeta window.Capacitor antes
      // dos scripts da página). Na web o nó é removido imediatamente.
      (function () {
        var el = document.getElementById("gm-abertura");
        if (!el) return;
        var nativo = !!(
          window.Capacitor &&
          typeof window.Capacitor.isNativePlatform === "function" &&
          window.Capacitor.isNativePlatform()
        );
        var reduz =
          window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (!nativo || reduz) {
          el.parentNode.removeChild(el);
          return;
        }
        el.classList.add("gm-ab-on");
        window.setTimeout(function () {
          el.classList.add("gm-ab-out");
        }, 4900);
        window.setTimeout(function () {
          if (el.parentNode) el.parentNode.removeChild(el);
        }, 5400);
      })();
    </script>
