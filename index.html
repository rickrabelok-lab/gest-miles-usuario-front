<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Gest Miles</title>
    <meta
      name="description"
      content="Gest Miles — gestão de milhas e pontos de fidelidade."
    />
    <meta name="author" content="Gest Miles" />
    <meta name="theme-color" content="#0d9488" />

    <script>
      // Esqueleto de boot: só nas rotas com shell autenticado. Nas públicas
      // (/auth*, /me) o próprio React renderiza a tela inteira — esqueleto some.
      // PATHS em sincronia com as rotas públicas de src/App.tsx.
      (function () {
        var p = window.location.pathname;
        var publico = p === "/auth" || p.indexOf("/auth/") === 0 || p === "/me";
        if (publico) document.documentElement.classList.add("gm-no-skeleton");
      })();
    </script>
    <style>
      /* Esqueleto de boot (1º frame, pré-JS) — substitui o antigo splash "VOA".
         React o remove no primeiro commit do render (markup vive dentro de #root).
         Cores hardcoded: o CSS do app ainda não carregou neste momento. */
      .gm-skel {
        position: fixed;
        inset: 0;
        z-index: 40;
        background: #f7f7f8;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html.gm-no-skeleton .gm-skel {
        display: none;
      }
      .gm-skel-page {
        max-width: 28rem;
        margin: 0 auto;
        padding: 22px 20px 0;
      }
      .gm-skel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }
      .gm-skel-brand {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.4px;
        color: #1f1f1f;
      }
      .gm-skel-brand span {
        color: #8a05be;
      }
      .gm-skel-circles {
        display: flex;
        gap: 8px;
      }
      .gm-skel-circle {
        width: 44px;
        height: 44px;
        border-radius: 16px;
        background: #ffffff;
        border: 1px solid #ececec;
      }
      .gm-skel-row {
        height: 48px;
        border-radius: 16px;
        background: #f1f1f3;
        margin-bottom: 18px;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      .gm-skel-card {
        height: 128px;
        border-radius: 20px;
        background: #ffffff;
        border: 1px solid #ececec;
        margin-bottom: 18px;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      .gm-skel-actions {
        display: flex;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      .gm-skel-action {
        width: 72px;
        height: 72px;
        border-radius: 24px;
        background: #ffffff;
        border: 1px solid #ececec;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      .gm-skel-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .gm-skel-tile {
        height: 150px;
        border-radius: 20px;
        background: #ffffff;
        border: 1px solid #ececec;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      .gm-skel-nav {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: #ffffff;
        border-top: 1px solid #ececec;
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 0 12px;
      }
      .gm-skel-nav-item {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: #f1f1f3;
        animation: gm-skel-pulse 1.6s ease-in-out infinite;
      }
      @keyframes gm-skel-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }
    </style>

    <!-- Open Graph (preview em WhatsApp, Telegram, etc.) -->
    <meta property="og:title" content="Gest Miles" />
    <meta
      property="og:description"
      content="Gest Miles — gestão de milhas e pontos de fidelidade."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.gestmiles.com.br/" />
    <!-- WhatsApp costuma preferir PNG 1200x630; SVG funciona em vários clientes. -->
    <meta
      property="og:image"
      content="https://app.gestmiles.com.br/og-gest-miles.svg"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gest Miles" />
    <meta
      name="twitter:description"
      content="Gest Miles — gestão de milhas e pontos de fidelidade."
    />
    <meta
      name="twitter:image"
      content="https://app.gestmiles.com.br/og-gest-miles.svg"
    />
  </head>

  <body>
    <div id="root">
      <div class="gm-skel" aria-hidden="true">
        <div class="gm-skel-page">
          <div class="gm-skel-header">
            <div class="gm-skel-brand">Gest<span>Miles</span></div>
            <div class="gm-skel-circles">
              <div class="gm-skel-circle"></div>
              <div class="gm-skel-circle"></div>
              <div class="gm-skel-circle"></div>
            </div>
          </div>
          <div class="gm-skel-row"></div>
          <div class="gm-skel-card"></div>
          <div class="gm-skel-actions">
            <div class="gm-skel-action"></div>
            <div class="gm-skel-action"></div>
            <div class="gm-skel-action"></div>
            <div class="gm-skel-action"></div>
          </div>
          <div class="gm-skel-grid">
            <div class="gm-skel-tile"></div>
            <div class="gm-skel-tile"></div>
          </div>
        </div>
        <div class="gm-skel-nav">
          <div class="gm-skel-nav-item"></div>
          <div class="gm-skel-nav-item"></div>
          <div class="gm-skel-nav-item"></div>
          <div class="gm-skel-nav-item"></div>
          <div class="gm-skel-nav-item"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
